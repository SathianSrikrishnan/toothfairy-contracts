[toolchain]
anchor_version = "0.32.1"

[features]
seeds = false
skip-lint = false

[programs.localnet]
toothfairy_escrow = "FqCSNerRsjdxamLyiyTvqiGKZ4vnfYngLUuTKtSi7RTC"

[programs.devnet]
toothfairy_escrow = "FqCSNerRsjdxamLyiyTvqiGKZ4vnfYngLUuTKtSi7RTC"

[programs.mainnet]
toothfairy_escrow = "FqCSNerRsjdxamLyiyTvqiGKZ4vnfYngLUuTKtSi7RTC"

[registry]
url = "https://api.apr.dev"

[provider]
# Set ANCHOR_PROVIDER_URL or use: solana config set --url <your-rpc-url>
cluster = "mainnet"
wallet = "~/.config/solana/id.json"

[test]
startup_wait = 30000

[test.validator]

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
